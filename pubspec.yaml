name: lucidwheels
description: Driver Monitoring & Accident Detection System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^6.2.1
  
  # State Management
  provider: ^6.1.1
  # Location & Geocoding
  geolocator: ^10.1.0
  # Sensors
  sensors_plus: ^4.0.2
  url_launcher: ^6.3.2
  # Camera & ML
  camera: ^0.12.0
  google_mlkit_face_detection: ^0.13.2
  
  # Audio & Haptics
  audioplayers: ^6.6.0
  vibration: ^3.1.8
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  
  # Location
  location: ^5.0.3
  geocoding: ^2.1.1
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  device_info_plus: ^12.3.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  cloud_functions: ^6.0.7
  firebase_messaging: ^16.1.2

dependency_overrides:
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/images/
    - assets/signs/


